# ADIM 9 — Buzz tam yerel stack: Postgres + Redis + MinIO + backend + transcoder + moderation
# Kullanım: docker compose up -d   (veya: make dev)

services:
  postgres:
    image: postgres:16-alpine
    container_name: buzz-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buzz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buzz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: buzz-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web konsol
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO'da "buzz" bucket'ını bir defalık oluşturur
  minio-init:
    image: minio/mc:latest
    container_name: buzz-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/buzz &&
      echo 'bucket hazır'
      "

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buzz-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/buzz
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-secret-change-me
      NODE_ENV: development
      PORT: "3000"
      # MinIO'yu S3 olarak kullan (endpoint destekliyorsa)
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_BUCKET_NAME: buzz
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_FOLDER_PREFIX: buzz/
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  transcoder:
    build:
      context: ./services/transcoder
    container_name: buzz-transcoder
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_BUCKET_NAME: buzz
      AWS_REGION: us-east-1
      AWS_FOLDER_PREFIX: buzz/
    restart: unless-stopped

  moderation:
    build:
      context: ./services/moderation
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package.json ./
        RUN npm install --omit=dev
        COPY worker.js ./
        CMD ["node", "worker.js"]
    container_name: buzz-moderation
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      NSFW_THRESHOLD: "0.7"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
