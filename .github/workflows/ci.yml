# ADIM 5 — CI: lint + unit + e2e (her PR ve main push'unda)
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Lint
        run: npx eslint "src/**/*.ts" --max-warnings 9999
      - name: Unit tests (jest)
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: buzz_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/buzz_e2e
      JWT_SECRET: ci-e2e-secret-not-for-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply schema to test DB
        run: npx prisma db push --skip-generate
      - name: Build
        run: npm run build
      - name: Playwright E2E (API akışı, tarayıcı gerekmez)
        run: npm run test:e2e:pw
